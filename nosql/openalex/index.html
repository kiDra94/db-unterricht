<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>OpenAlex BibTeX Suche</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    input[type="text"] { padding: 8px; width: 70%; font-size: 16px; }
    .search-btn { padding: 8px 16px; font-size: 16px; cursor: pointer; }
    
    .result-item { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; background-color: #fafafa; }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .result-header h3 { margin: 0; font-size: 18px; }
    
    pre { background: #eee; padding: 15px; border-radius: 5px; overflow-x: auto; font-family: monospace; border: 1px solid #ccc; }
    
    /* Styling für den Kopieren-Button */
    .copy-btn { 
      padding: 5px 10px; 
      font-size: 14px; 
      cursor: pointer; 
      background-color: #007bff; 
      color: white; 
      border: none; 
      border-radius: 3px; 
      transition: background-color 0.2s;
    }
    .copy-btn:hover { background-color: #0056b3; }
    .copy-btn.copied { background-color: #28a745; } /* Grün wenn kopiert */
  </style>
</head>
<body>
  <h1>Literatur in MongoDB suchen</h1>
  <input type="text" id="search" placeholder="Zeitschriften- oder Artikeltitel eingeben...">
  <button id="searchBtn" class="search-btn">Suchen</button>
  
  <div id="results"></div>

  <script>
    document.getElementById("searchBtn").addEventListener("click", async () => {
      const query = document.getElementById("search").value;
      const list = document.getElementById("results");
      list.innerHTML = "<p>Lade...</p>";

      try {
        const res = await fetch(`http://localhost:5000/search?q=${encodeURIComponent(query)}`);
        if (!res.ok) throw new Error("Netzwerkfehler beim Abfragen des Servers.");
        const data = await res.json();

        list.innerHTML = "";

        if (data.length === 0) {
          list.innerHTML = "<p>Keine Ergebnisse gefunden.</p>";
          return;
        }

        data.forEach(item => {
          const div = document.createElement("div");
          div.className = "result-item";
          
          // Header-Bereich für Titel und Button
          const headerDiv = document.createElement("div");
          headerDiv.className = "result-header";
          
          const title = document.createElement("h3");
          title.textContent = `${item.display_name} (${item.publication_year})`;
          
          // Kopieren-Button erstellen
          const copyBtn = document.createElement("button");
          copyBtn.className = "copy-btn";
          copyBtn.textContent = "📋 Kopieren";
          
          // Klick-Event für das Kopieren
          copyBtn.addEventListener("click", () => {
            navigator.clipboard.writeText(item.bibtex).then(() => {
              // Visuelles Feedback
              copyBtn.textContent = "✔ Kopiert!";
              copyBtn.classList.add("copied");
              
              // Nach 2 Sekunden wieder zurücksetzen
              setTimeout(() => {
                copyBtn.textContent = "📋 Kopieren";
                copyBtn.classList.remove("copied");
              }, 2000);
            }).catch(err => {
              console.error('Fehler beim Kopieren:', err);
              alert("Kopieren fehlgeschlagen.");
            });
          });

          // BibTeX-Code Block
          const bibtexBlock = document.createElement("pre");
          bibtexBlock.textContent = item.bibtex;

          // Elemente zusammenbauen
          headerDiv.appendChild(title);
          headerDiv.appendChild(copyBtn);
          
          div.appendChild(headerDiv);
          div.appendChild(bibtexBlock);
          list.appendChild(div);
        });
      } catch (error) {
        list.innerHTML = `<p style="color:red;">Fehler: ${error.message}</p>`;
      }
    });

    // Erlaubt das Suchen durch Drücken der Enter-Taste
    document.getElementById("search").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        document.getElementById("searchBtn").click();
      }
    });
  </script>
</body>
</html>
